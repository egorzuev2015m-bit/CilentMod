<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheatMod</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b0b1a, #030308);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: rgba(18, 18, 40, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 580px;
      width: 100%;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
      text-align: center;
    }

    .logo {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #8888bb;
      margin: 6px 0 12px;
      font-size: 15px;
    }

    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.18);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: #a5b4fc;
      padding: 4px 18px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
    }

    .features-title {
      color: #aaaadd;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 10px 0 14px;
      opacity: 0.7;
    }

    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .feature-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 14px;
      padding: 12px 6px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: #c4c4e0;
      font-size: 13px;
    }

    .btn-download {
      display: inline-block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: 0.25s;
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5);
    }

    .btn-support {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: rgba(255, 215, 0, 0.08);
      border: 1.5px solid rgba(255, 215, 0, 0.25);
      border-radius: 16px;
      color: #fbbf24;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 6px;
      text-decoration: none;
    }

    .btn-support:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: #fbbf24;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #16162e;
      border-radius: 28px;
      padding: 36px 32px;
      max-width: 440px;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(12px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal h2 {
      color: #fbbf24;
      font-size: 26px;
      margin-bottom: 6px;
    }

    .modal p {
      color: #a5a5c0;
      font-size: 15px;
      margin-bottom: 22px;
    }

    .amount-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }

    .amount-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 10px;
      color: #c4c4e0;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .amount-btn:hover {
      background: rgba(255, 215, 0, 0.08);
      border-color: #fbbf24;
      color: #fbbf24;
    }

    .amount-btn.active {
      background: rgba(255, 215, 0, 0.12);
      border-color: #fbbf24;
      color: #fbbf24;
    }

    .custom-amount-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      text-align: center;
      outline: none;
      transition: 0.2s;
      margin-bottom: 18px;
      display: none;
    }

    .custom-amount-input:focus {
      border-color: #fbbf24;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
    }

    .custom-amount-input.show {
      display: block;
    }

    .btn-pay {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border: none;
      border-radius: 14px;
      color: #0b0b1a;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.25s;
      text-decoration: none;
      text-align: center;
    }

    .btn-pay:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(251, 191, 36, 0.3);
    }

    .btn-close-modal {
      background: transparent;
      border: none;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      margin-top: 14px;
      transition: 0.2s;
    }

    .btn-close-modal:hover {
      color: #aaa;
    }

    .footer {
      margin-top: 24px;
      color: #444466;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
      }
      .features-grid {
        grid-template-columns: 1fr 1fr;
      }
      .amount-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">⚡ CheatMod</div>
    <div class="subtitle">Legit Client for Minecraft 1.20.1</div>
    <div class="badge">🔥 31+ функций</div>

    <div class="features-title">В чите есть:</div>

    <div class="features-grid">
      <div class="feature-item">PvP</div>
      <div class="feature-item">Движение</div>
      <div class="feature-item">Игрок</div>
      <div class="feature-item">Визуал</div>
      <div class="feature-item">Фарм</div>
      <div class="feature-item">Авторизация</div>
    </div>

    <a href="#" class="btn-download" id="downloadBtn">
      Скачать CheatMod
    </a>

    <button class="btn-support" id="supportBtn">
      ❤️ Поддержать автора
    </button>

    <div class="footer">
      Бесплатно · Open Source · 31 модуль
    </div>
  </div>

  <div class="modal-overlay" id="donateModal">
    <div class="modal">
      <h2>Поддержка</h2>
      <p>Выберите сумму или введите свою</p>

      <div class="amount-grid">
        <button class="amount-btn" data-amount="100">100 ₽</button>
        <button class="amount-btn active" data-amount="150">150 ₽</button>
        <button class="amount-btn" data-amount="300">300 ₽</button>
        <button class="amount-btn" data-amount="500">500 ₽</button>
        <button class="amount-btn" data-amount="1000">1000 ₽</button>
        <button class="amount-btn" data-amount="custom">Своя</button>
      </div>

      <input type="number" class="custom-amount-input" id="customAmount"
      placeholder="Введите сумму в ₽" min="1" step="1">

      <a href="#" class="btn-pay" id="payBtn">
        Оплатить через ЮMoney
      </a>

      <button class="btn-close-modal" id="closeModalBtn">Закрыть</button>
    </div>
  </div>

  <script>
    const YM_WALLET = '4100119561922969';

    const modal = document.getElementById('donateModal');
    const supportBtn = document.getElementById('supportBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const payBtn = document.getElementById('payBtn');
    const customInput = document.getElementById('customAmount');
    const amountBtns = document.querySelectorAll('.amount-btn');
    let selectedAmount = 150;

    supportBtn.addEventListener('click', () => {
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
      updatePayLink();
    });

    function closeModal() {
      modal.classList.remove('active');
      document.body.style.overflow = '';
      customInput.classList.remove('show');
      customInput.value = '';
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    amountBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        amountBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (btn.dataset.amount === 'custom') {
          customInput.classList.add('show');
          customInput.focus();
          selectedAmount = null;
        } else {
          customInput.classList.remove('show');
          selectedAmount = parseInt(btn.dataset.amount);
          customInput.value = '';
        }
        updatePayLink();
      });
    });

    customInput.addEventListener('input', () => {
      const val = parseInt(customInput.value);
      if (val && val > 0) {
        selectedAmount = val;
      } else {
        selectedAmount = null;
      }
      updatePayLink();
    });

    function updatePayLink() {
      if (!selectedAmount || selectedAmount <= 0) {
        payBtn.textContent = 'Введите сумму';
        payBtn.href = '#';
        payBtn.style.opacity = '0.5';
        return;
      }

      payBtn.style.opacity = '1';
      payBtn.textContent = `Оплатить ${selectedAmount} ₽ через ЮMoney`;

      const url =
        `https://yoomoney.ru/quickpay/confirm.xml?` +
        `receiver=${YM_WALLET}` +
        `&quickpay-form=shop` +
        `&targets=Донат+на+CheatMod` +
        `&sum=${selectedAmount}` +
        `&paymentType=PC`;

      payBtn.href = url;
    }

    document.getElementById('downloadBtn').addEventListener('click', (e) => {
      e.preventDefault();
    });

    updatePayLink();
  </script>

</body>
</html>
